<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joki Dashboard</title>
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #17171e;
    --bg3: #1e1e28;
    --card: #1a1a24;
    --border: #2a2a38;
    --border2: #35354a;
    --accent: #7c6fff;
    --accent2: #6358e8;
    --green: #22c97a;
    --red: #ff4f4f;
    --yellow: #f5c518;
    --orange: #ff7c3a;
    --text: #eeeef5;
    --text2: #9999b3;
    --text3: #55556a;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* NAV */
  nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 0; height: 52px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-size: 16px; font-weight: 700; color: var(--accent); margin-right: 24px; letter-spacing: -0.3px; }
  .nav-tabs { display: flex; gap: 2px; flex: 1; }
  .nav-tab { padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; border: none; background: none; transition: all 0.15s; }
  .nav-tab:hover { color: var(--text); background: var(--bg3); }
  .nav-tab.active { color: var(--accent); background: rgba(124,111,255,0.12); }
  .nav-time { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* PAGES */
  .page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-item { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; min-width: 240px; animation: slideIn 0.2s ease; }
  .toast-item.danger { border-color: var(--red); }
  .toast-item.success { border-color: var(--green); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .toast-dot.danger { background: var(--red); }
  .toast-dot.success { background: var(--green); }
  .toast-dot.warn { background: var(--yellow); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* ALERT BANNER */
  .alert-banner { border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .alert-banner.danger { background: rgba(255,79,79,0.1); border: 1px solid rgba(255,79,79,0.3); color: #ff7e7e; }
  .alert-banner.warn { background: rgba(245,197,24,0.1); border: 1px solid rgba(245,197,24,0.3); color: #f5c518; }
  .alert-banner.success { background: rgba(34,201,122,0.1); border: 1px solid rgba(34,201,122,0.3); color: #22c97a; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.accent { color: var(--accent); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* SECTION */
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; margin-top: 24px; }
  .section-title:first-child { margin-top: 0; }

  /* FORM */
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; color: var(--text2); font-weight: 500; }
  input, select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 8px 11px; font-size: 13px; font-family: inherit; width: 100%; outline: none; transition: border 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }
  textarea { resize: vertical; min-height: 70px; }

  /* BUTTONS */
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text3); }
  .btn-danger { background: rgba(255,79,79,0.15); color: var(--red); border: 1px solid rgba(255,79,79,0.3); }
  .btn-danger:hover { background: rgba(255,79,79,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

  /* TABLE / LIST */
  .order-list { display: flex; flex-direction: column; gap: 8px; }
  .order-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
  .order-item.urgent { border-color: rgba(255,79,79,0.4); }
  .order-item.warning-item { border-color: rgba(245,197,24,0.4); }
  .order-item.done { opacity: 0.5; }
  .order-main { flex: 1; min-width: 0; }
  .order-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .order-num { font-size: 15px; font-weight: 700; color: var(--accent); }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-red { background: rgba(255,79,79,0.15); color: var(--red); }
  .badge-yellow { background: rgba(245,197,24,0.15); color: var(--yellow); }
  .badge-green { background: rgba(34,201,122,0.15); color: var(--green); }
  .badge-accent { background: rgba(124,111,255,0.15); color: var(--accent); }
  .badge-gray { background: var(--bg3); color: var(--text3); }
  .order-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; }
  .order-meta span { display: flex; align-items: center; gap: 4px; }
  .order-detail { font-size: 12px; color: var(--text3); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .order-fee { font-size: 14px; font-weight: 700; color: var(--green); white-space: nowrap; }

  /* DEADLINE COUNTDOWN */
  .countdown { font-size: 12px; font-weight: 600; }
  .countdown.urgent { color: var(--red); }
  .countdown.warn { color: var(--yellow); }
  .countdown.ok { color: var(--green); }

  /* CICILAN */
  .cicilan-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .cicilan-info { flex: 1; }
  .cicilan-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .cicilan-detail { font-size: 12px; color: var(--text2); }
  .cicilan-amount { font-size: 16px; font-weight: 700; color: var(--orange); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }

  /* PENGELUARAN LIST */
  .expense-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .expense-name { font-size: 13px; font-weight: 500; }
  .expense-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .expense-amount { font-size: 14px; font-weight: 700; color: var(--red); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 22px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.three { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .order-item { flex-direction: column; }
    .order-actions { width: 100%; justify-content: flex-end; }
    nav { padding: 0 12px; }
    .nav-tab { padding: 6px 10px; font-size: 12px; }
    .page { padding: 14px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">⚡ JokiTrack</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showPage('orders')">Order</button>
    <button class="nav-tab" onclick="showPage('expenses')">Pengeluaran</button>
    <button class="nav-tab" onclick="showPage('cicilan')">Cicilan</button>
  </div>
  <div class="nav-time" id="navTime"></div>
</nav>

<div id="toast"></div>

<!-- MODAL TAMBAH ORDER -->
<div class="modal-overlay" id="modalOrder">
  <div class="modal">
    <div class="modal-title">Tambah order baru</div>
    <div class="form-grid">
      <div class="field">
        <label>Nomor hunter / cust</label>
        <input type="text" id="o-num" placeholder="cth: 0812xxx / H-001">
      </div>
      <div class="field">
        <label>Grup asal order</label>
        <input type="text" id="o-grup" placeholder="cth: Grup A, WA Pribadi">
      </div>
      <div class="field">
        <label>Deadline</label>
        <input type="datetime-local" id="o-dl">
      </div>
      <div class="field">
        <label>Fee (Rp)</label>
        <input type="number" id="o-fee" placeholder="50000">
      </div>
      <div class="field form-full">
        <label>Detail tugas</label>
        <textarea id="o-detail" placeholder="cth: Essay 5 halaman tema lingkungan, format APA..."></textarea>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="o-status">
          <option value="pending">Belum dikerjakan</option>
          <option value="progress">Sedang dikerjakan</option>
          <option value="done">Selesai</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('modalOrder')">Batal</button>
      <button class="btn btn-primary" onclick="saveOrder()">Simpan order</button>
    </div>
  </div>
</div>

<!-- MODAL TAMBAH PENGELUARAN -->
<div class="modal-overlay" id="modalExpense">
  <div class="modal">
    <div class="modal-title">Catat pengeluaran</div>
    <div class="form-grid">
      <div class="field form-full">
        <label>Keterangan pengeluaran</label>
        <input type="text" id="e-name" placeholder="cth: makan siang, bensin, jajan">
      </div>
      <div class="field form-full">
        <label>Jumlah (Rp)</label>
        <input type="number" id="e-amount" placeholder="25000">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('modalExpense')">Batal</button>
      <button class="btn btn-primary" onclick="saveExpense()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL EDIT ORDER -->
<div class="modal-overlay" id="modalEditOrder">
  <div class="modal">
    <div class="modal-title">Edit order</div>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="field">
        <label>Nomor hunter / cust</label>
        <input type="text" id="edit-num">
      </div>
      <div class="field">
        <label>Grup asal order</label>
        <input type="text" id="edit-grup">
      </div>
      <div class="field">
        <label>Deadline</label>
        <input type="datetime-local" id="edit-dl">
      </div>
      <div class="field">
        <label>Fee (Rp)</label>
        <input type="number" id="edit-fee">
      </div>
      <div class="field form-full">
        <label>Detail tugas</label>
        <textarea id="edit-detail"></textarea>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="edit-status">
          <option value="pending">Belum dikerjakan</option>
          <option value="progress">Sedang dikerjakan</option>
          <option value="done">Selesai</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('modalEditOrder')">Batal</button>
      <button class="btn btn-primary" onclick="updateOrder()">Simpan perubahan</button>
    </div>
  </div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div id="dash-alerts"></div>
  <div class="stats-grid" id="dash-stats"></div>
  <div class="section-title">Deadline mendekat</div>
  <div class="order-list" id="dash-orders"></div>
</div>

<!-- PAGE: ORDERS -->
<div class="page" id="page-orders">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <div style="font-size:16px;font-weight:700;">Semua order</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px;">Data tersimpan di browser ini</div>
    </div>
    <button class="btn btn-primary" onclick="openModal('modalOrder')">+ Tambah order</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <button class="btn btn-ghost btn-sm active-filter" id="f-all" onclick="filterOrders('all')">Semua</button>
    <button class="btn btn-ghost btn-sm" id="f-pending" onclick="filterOrders('pending')">Belum</button>
    <button class="btn btn-ghost btn-sm" id="f-progress" onclick="filterOrders('progress')">Dikerjakan</button>
    <button class="btn btn-ghost btn-sm" id="f-done" onclick="filterOrders('done')">Selesai</button>
  </div>
  <div class="order-list" id="orders-list"></div>
</div>

<!-- PAGE: EXPENSES -->
<div class="page" id="page-expenses">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <div style="font-size:16px;font-weight:700;">Pengeluaran hari ini</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px;">Limit harian: Rp 50.000</div>
    </div>
    <button class="btn btn-primary" onclick="openModal('modalExpense')">+ Catat</button>
  </div>
  <div id="expense-alerts"></div>
  <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:20px;" id="expense-stats"></div>
  <div class="section-title">Pengeluaran hari ini</div>
  <div id="expense-list"></div>
</div>

<!-- PAGE: CICILAN -->
<div class="page" id="page-cicilan">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div style="font-size:16px;font-weight:700;">Tracker cicilan</div>
    <button class="btn btn-ghost btn-sm" onclick="openAddCicilan()">+ Tambah</button>
  </div>
  <div id="cicilan-list"></div>
  <div id="modal-cicilan" class="modal-overlay">
    <div class="modal">
      <div class="modal-title">Tambah / edit cicilan</div>
      <input type="hidden" id="cic-id">
      <div class="form-grid">
        <div class="field form-full">
          <label>Nama cicilan</label>
          <input type="text" id="cic-name" placeholder="cth: Cicilan HP, Laptop">
        </div>
        <div class="field">
          <label>Total hutang (Rp)</label>
          <input type="number" id="cic-total" placeholder="80000000">
        </div>
        <div class="field">
          <label>Cicilan per bulan (Rp)</label>
          <input type="number" id="cic-monthly" placeholder="500000">
        </div>
        <div class="field">
          <label>Sudah dibayar (bulan)</label>
          <input type="number" id="cic-paid" placeholder="0" min="0">
        </div>
        <div class="field">
          <label>Total bulan cicilan</label>
          <input type="number" id="cic-tenor" placeholder="24">
        </div>
        <div class="field">
          <label>Tanggal jatuh tempo</label>
          <input type="number" id="cic-due" placeholder="5" min="1" max="31">
          <span style="font-size:11px;color:var(--text3);">Tanggal berapa tiap bulan</span>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal('modal-cicilan')">Batal</button>
        <button class="btn btn-primary" onclick="saveCicilan()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script>
const LIMIT_HARIAN = 50000;
let currentFilter = 'all';

function getData(key, def=[]) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function setData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function fmtRp(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function fmtDate(dt) {
  if (!dt) return '-';
  const d = new Date(dt);
  return d.toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function todayStr() { return new Date().toISOString().split('T')[0]; }

function countdown(dtStr) {
  if (!dtStr) return {text:'-', cls:'ok'};
  const diff = new Date(dtStr) - new Date();
  if (diff < 0) return {text:'LEWAT DL!', cls:'urgent'};
  const h = Math.floor(diff/3600000);
  const d = Math.floor(h/24);
  const rem = h % 24;
  if (h < 6) return {text: h+'j '+Math.floor((diff%3600000)/60000)+'m lagi', cls:'urgent'};
  if (h < 24) return {text: h+'j lagi', cls:'warn'};
  return {text: d+'h '+rem+'j lagi', cls:'ok'};
}

function statusBadge(s) {
  if (s==='done') return '<span class="badge badge-green">Selesai</span>';
  if (s==='progress') return '<span class="badge badge-accent">Dikerjakan</span>';
  return '<span class="badge badge-gray">Belum</span>';
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.innerHTML = `<div class="toast-dot ${type}"></div><span>${msg}</span>`;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  event.target.classList.add('active');
  if (p==='dashboard') renderDashboard();
  if (p==='orders') renderOrders();
  if (p==='expenses') renderExpenses();
  if (p==='cicilan') renderCicilan();
}

/* ---- ORDERS ---- */
function saveOrder() {
  const num = document.getElementById('o-num').value.trim();
  const dl = document.getElementById('o-dl').value;
  if (!num || !dl) { showToast('Nomor hunter dan deadline wajib diisi', 'danger'); return; }
  const orders = getData('orders');
  orders.push({
    id: Date.now(),
    num, grup: document.getElementById('o-grup').value.trim(),
    dl, fee: document.getElementById('o-fee').value,
    detail: document.getElementById('o-detail').value.trim(),
    status: document.getElementById('o-status').value,
    created: new Date().toISOString()
  });
  setData('orders', orders);
  closeModal('modalOrder');
  ['o-num','o-grup','o-dl','o-fee','o-detail'].forEach(id => document.getElementById(id).value='');
  document.getElementById('o-status').value='pending';
  renderOrders(); renderDashboard();
  showToast('Order berhasil disimpan!', 'success');
}

function filterOrders(f) {
  currentFilter = f;
  ['all','pending','progress','done'].forEach(x => {
    document.getElementById('f-'+x).style.color = x===f ? 'var(--accent)' : '';
    document.getElementById('f-'+x).style.borderColor = x===f ? 'var(--accent)' : '';
  });
  renderOrders();
}

function renderOrders() {
  let orders = getData('orders');
  if (currentFilter !== 'all') orders = orders.filter(o => o.status === currentFilter);
  orders.sort((a,b) => new Date(a.dl)-new Date(b.dl));
  const el = document.getElementById('orders-list');
  if (!orders.length) { el.innerHTML = '<div class="empty">Belum ada order. Tambah order dulu ya!</div>'; return; }
  el.innerHTML = orders.map(o => orderCard(o, true)).join('');
}

function orderCard(o, actions=false) {
  const cd = countdown(o.dl);
  const urgent = cd.cls==='urgent';
  const warn = cd.cls==='warn';
  return `<div class="order-item ${urgent&&o.status!=='done'?'urgent':''} ${warn&&o.status!=='done'?'warning-item':''} ${o.status==='done'?'done':''}">
    <div class="order-main">
      <div class="order-top">
        <span class="order-num">#${o.num}</span>
        ${statusBadge(o.status)}
        <span class="countdown ${o.status==='done'?'ok':cd.cls}">${o.status==='done'?'Selesai':cd.text}</span>
        ${o.grup ? `<span class="badge badge-accent">${o.grup}</span>` : ''}
      </div>
      <div class="order-meta">
        <span>📅 DL: ${fmtDate(o.dl)}</span>
        ${o.fee ? `<span class="order-fee">${fmtRp(o.fee)}</span>` : ''}
      </div>
      ${o.detail ? `<div class="order-detail">📋 ${o.detail}</div>` : ''}
    </div>
    ${actions ? `<div class="order-actions">
      <button class="btn btn-ghost btn-sm" onclick="editOrder(${o.id})">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">Hapus</button>
    </div>` : ''}
  </div>`;
}

function editOrder(id) {
  const orders = getData('orders');
  const o = orders.find(x => x.id===id);
  if (!o) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-num').value = o.num;
  document.getElementById('edit-grup').value = o.grup || '';
  document.getElementById('edit-dl').value = o.dl;
  document.getElementById('edit-fee').value = o.fee || '';
  document.getElementById('edit-detail').value = o.detail || '';
  document.getElementById('edit-status').value = o.status;
  openModal('modalEditOrder');
}

function updateOrder() {
  const id = parseInt(document.getElementById('edit-id').value);
  const orders = getData('orders');
  const idx = orders.findIndex(x => x.id===id);
  if (idx===-1) return;
  orders[idx] = { ...orders[idx],
    num: document.getElementById('edit-num').value.trim(),
    grup: document.getElementById('edit-grup').value.trim(),
    dl: document.getElementById('edit-dl').value,
    fee: document.getElementById('edit-fee').value,
    detail: document.getElementById('edit-detail').value.trim(),
    status: document.getElementById('edit-status').value
  };
  setData('orders', orders);
  closeModal('modalEditOrder');
  renderOrders(); renderDashboard();
  showToast('Order diperbarui!', 'success');
}

function deleteOrder(id) {
  if (!confirm('Hapus order ini?')) return;
  let orders = getData('orders');
  orders = orders.filter(x => x.id!==id);
  setData('orders', orders);
  renderOrders(); renderDashboard();
  showToast('Order dihapus', 'warn');
}

/* ---- EXPENSES ---- */
function saveExpense() {
  const name = document.getElementById('e-name').value.trim();
  const amount = parseFloat(document.getElementById('e-amount').value);
  if (!name || !amount) { showToast('Isi keterangan dan jumlah ya!', 'danger'); return; }
  const expenses = getData('expenses');
  expenses.push({ id: Date.now(), name, amount, date: todayStr(), time: new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) });
  setData('expenses', expenses);
  document.getElementById('e-name').value='';
  document.getElementById('e-amount').value='';
  closeModal('modalExpense');
  renderExpenses();
  const todayExp = expenses.filter(e => e.date===todayStr()).reduce((s,e) => s+e.amount, 0);
  if (todayExp > LIMIT_HARIAN) {
    showToast(`⚠️ Pengeluaran hari ini ${fmtRp(todayExp)} — melebihi limit ${fmtRp(LIMIT_HARIAN)}!`, 'danger');
  } else {
    showToast('Pengeluaran dicatat!', 'success');
  }
}

function deleteExpense(id) {
  let expenses = getData('expenses');
  expenses = expenses.filter(x => x.id!==id);
  setData('expenses', expenses);
  renderExpenses();
}

function renderExpenses() {
  const expenses = getData('expenses');
  const today = expenses.filter(e => e.date===todayStr());
  const todayTotal = today.reduce((s,e) => s+e.amount, 0);
  const sisa = Math.max(0, LIMIT_HARIAN - todayTotal);
  const pct = Math.min(100, Math.round(todayTotal/LIMIT_HARIAN*100));

  const alerts = document.getElementById('expense-alerts');
  if (todayTotal > LIMIT_HARIAN) {
    alerts.innerHTML = `<div class="alert-banner danger">⛔ Kamu sudah melewati batas harian! Pengeluaran hari ini ${fmtRp(todayTotal)} dari limit ${fmtRp(LIMIT_HARIAN)}. Kurangi pengeluaran ya!</div>`;
  } else if (todayTotal > LIMIT_HARIAN * 0.8) {
    alerts.innerHTML = `<div class="alert-banner warn">⚠️ Hampir habis! Sudah pakai ${pct}% dari limit harian. Sisa ${fmtRp(sisa)}.</div>`;
  } else {
    alerts.innerHTML = `<div class="alert-banner success">✅ Pengeluaran aman. Sisa ${fmtRp(sisa)} hari ini.</div>`;
  }

  document.getElementById('expense-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Hari ini</div><div class="stat-value ${todayTotal>LIMIT_HARIAN?'red':'green'}">${fmtRp(todayTotal)}</div><div class="stat-sub">${pct}% dari limit</div></div>
    <div class="stat-card"><div class="stat-label">Sisa limit</div><div class="stat-value ${sisa===0?'red':'yellow'}">${fmtRp(sisa)}</div><div class="stat-sub">dari ${fmtRp(LIMIT_HARIAN)}</div></div>
    <div class="stat-card"><div class="stat-label">Total transaksi</div><div class="stat-value accent">${today.length}</div><div class="stat-sub">hari ini</div></div>
  `;

  const list = document.getElementById('expense-list');
  if (!today.length) { list.innerHTML = '<div class="empty">Belum ada pengeluaran hari ini.</div>'; return; }
  list.innerHTML = [...today].reverse().map(e => `
    <div class="expense-item">
      <div><div class="expense-name">${e.name}</div><div class="expense-time">${e.time}</div></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="expense-amount">${fmtRp(e.amount)}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">×</button>
      </div>
    </div>
  `).join('');
}

/* ---- CICILAN ---- */
function openAddCicilan() {
  ['cic-id','cic-name','cic-total','cic-monthly','cic-paid','cic-tenor','cic-due'].forEach(id => document.getElementById(id).value='');
  openModal('modal-cicilan');
}

function saveCicilan() {
  const name = document.getElementById('cic-name').value.trim();
  if (!name) { showToast('Nama cicilan wajib diisi', 'danger'); return; }
  const cicilans = getData('cicilans');
  const id = document.getElementById('cic-id').value;
  const data = {
    id: id ? parseInt(id) : Date.now(),
    name,
    total: parseFloat(document.getElementById('cic-total').value)||0,
    monthly: parseFloat(document.getElementById('cic-monthly').value)||0,
    paid: parseInt(document.getElementById('cic-paid').value)||0,
    tenor: parseInt(document.getElementById('cic-tenor').value)||0,
    due: parseInt(document.getElementById('cic-due').value)||1,
  };
  const idx = cicilans.findIndex(x => x.id===data.id);
  if (idx>-1) cicilans[idx]=data; else cicilans.push(data);
  setData('cicilans', cicilans);
  closeModal('modal-cicilan');
  renderCicilan();
  showToast('Cicilan disimpan!', 'success');
}

function editCicilan(id) {
  const c = getData('cicilans').find(x => x.id===id);
  if (!c) return;
  document.getElementById('cic-id').value=c.id;
  document.getElementById('cic-name').value=c.name;
  document.getElementById('cic-total').value=c.total;
  document.getElementById('cic-monthly').value=c.monthly;
  document.getElementById('cic-paid').value=c.paid;
  document.getElementById('cic-tenor').value=c.tenor;
  document.getElementById('cic-due').value=c.due;
  openModal('modal-cicilan');
}

function deleteCicilan(id) {
  if (!confirm('Hapus cicilan ini?')) return;
  setData('cicilans', getData('cicilans').filter(x=>x.id!==id));
  renderCicilan();
}

function renderCicilan() {
  const cicilans = getData('cicilans');

  // Tambah cicilan default kalau belum ada
  if (!cicilans.length) {
    const defaults = [
      { id: 1, name: 'Cicilan 80jt', total: 80000000, monthly: 0, paid: 0, tenor: 0, due: 1 },
      { id: 2, name: 'Cicilan laptop', total: 2500000, monthly: 500000, paid: 0, tenor: 5, due: 5 }
    ];
    setData('cicilans', defaults);
    renderCicilan(); return;
  }

  const today = new Date();
  const el = document.getElementById('cicilan-list');
  if (!cicilans.length) { el.innerHTML = '<div class="empty">Belum ada cicilan.</div>'; return; }

  el.innerHTML = cicilans.map(c => {
    const sisaBulan = c.tenor - c.paid;
    const lunas = sisaBulan <= 0;
    const pct = c.tenor ? Math.round(c.paid/c.tenor*100) : 0;
    const sudahBayar = c.paid * c.monthly;
    const sisaTotal = c.total - sudahBayar;

    let dueBadge = '';
    const dueDate = new Date(today.getFullYear(), today.getMonth(), c.due);
    const diffDue = Math.ceil((dueDate - today) / 86400000);
    if (!lunas) {
      if (diffDue < 0) dueBadge = `<span class="badge badge-red">Jatuh tempo terlewat!</span>`;
      else if (diffDue <= 3) dueBadge = `<span class="badge badge-yellow">Jatuh tempo ${diffDue}h lagi</span>`;
      else dueBadge = `<span class="badge badge-gray">Tgl ${c.due} tiap bulan</span>`;
    }

    return `<div class="cicilan-card" style="${!lunas&&diffDue<=3?'border-color:rgba(245,197,24,0.4)':''}">
      <div class="cicilan-info">
        <div class="cicilan-name">${c.name} ${lunas?'<span class="badge badge-green">Lunas!</span>':dueBadge}</div>
        <div class="cicilan-detail">${c.paid}/${c.tenor} bulan dibayar · Sisa ${fmtRp(Math.max(0,sisaTotal))}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${lunas?'var(--green)':'var(--accent)'}"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">${pct}% terlunasi</div>
      </div>
      <div style="text-align:right;margin-left:16px;flex-shrink:0;">
        <div class="cicilan-amount">${fmtRp(c.monthly)}/bln</div>
        <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end;">
          <button class="btn btn-ghost btn-sm" onclick="editCicilan(${c.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCicilan(${c.id})">Hapus</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ---- DASHBOARD ---- */
function renderDashboard() {
  const orders = getData('orders');
  const expenses = getData('expenses');
  const today = expenses.filter(e => e.date===todayStr()).reduce((s,e)=>s+e.amount,0);
  const active = orders.filter(o=>o.status!=='done');
  const totalFee = orders.filter(o=>o.status==='done').reduce((s,o)=>s+parseFloat(o.fee||0),0);

  const urgent = active.filter(o=>{
    const h = (new Date(o.dl)-new Date())/3600000;
    return h>=0 && h<24;
  });

  const alerts = document.getElementById('dash-alerts');
  let alertHtml = '';
  if (today > LIMIT_HARIAN) alertHtml += `<div class="alert-banner danger">⛔ Pengeluaran hari ini ${fmtRp(today)} melebihi limit harian ${fmtRp(LIMIT_HARIAN)}!</div>`;
  if (urgent.length) alertHtml += `<div class="alert-banner warn">⚡ ${urgent.length} order deadline dalam 24 jam ke depan!</div>`;
  const overdue = active.filter(o => new Date(o.dl)<new Date());
  if (overdue.length) alertHtml += `<div class="alert-banner danger">🚨 ${overdue.length} order SUDAH MELEWATI deadline!</div>`;
  alerts.innerHTML = alertHtml;

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Order aktif</div><div class="stat-value accent">${active.length}</div><div class="stat-sub">${orders.filter(o=>o.status==='done').length} selesai</div></div>
    <div class="stat-card"><div class="stat-label">Deadline hari ini</div><div class="stat-value ${urgent.length?'red':'green'}">${urgent.length}</div><div class="stat-sub">dalam 24 jam</div></div>
    <div class="stat-card"><div class="stat-label">Fee terkumpul</div><div class="stat-value green">${fmtRp(totalFee)}</div><div class="stat-sub">dari order selesai</div></div>
    <div class="stat-card"><div class="stat-label">Pengeluaran hari ini</div><div class="stat-value ${today>LIMIT_HARIAN?'red':'yellow'}">${fmtRp(today)}</div><div class="stat-sub">limit ${fmtRp(LIMIT_HARIAN)}</div></div>
  `;

  const urgentOrders = [...active].sort((a,b)=>new Date(a.dl)-new Date(b.dl)).slice(0,5);
  const el = document.getElementById('dash-orders');
  if (!urgentOrders.length) { el.innerHTML = '<div class="empty">Tidak ada order aktif saat ini.</div>'; return; }
  el.innerHTML = urgentOrders.map(o => orderCard(o, false)).join('');
}

/* ---- CLOCK ---- */
function updateClock() {
  const now = new Date();
  document.getElementById('navTime').textContent = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

/* ---- ALARM CHECK (tiap 1 menit) ---- */
function checkAlarms() {
  const orders = getData('orders').filter(o=>o.status!=='done');
  orders.forEach(o => {
    const diff = (new Date(o.dl) - new Date()) / 3600000;
    if (diff > 0 && diff <= 1 && diff > 0.98) showToast(`🔔 Order #${o.num} deadline dalam 1 JAM!`, 'danger');
    if (diff > 5.98 && diff <= 6) showToast(`⚠️ Order #${o.num} deadline dalam 6 jam`, 'warn');
    if (diff > 11.98 && diff <= 12) showToast(`📢 Order #${o.num} deadline dalam 12 jam`, 'warn');
    if (diff > 23.98 && diff <= 24) showToast(`📅 Order #${o.num} deadline besok!`, 'warn');
  });
}
setInterval(checkAlarms, 60000);

/* ---- HOURLY REMINDER ---- */
function checkHourlyReminder() {
  const now = new Date();
  if (now.getMinutes() === 0) {
    const orders = getData('orders').filter(o=>o.status==='progress');
    if (orders.length) showToast(`⏰ Reminder: ${orders.length} order sedang dikerjakan!`, 'warn');
  }
}
setInterval(checkHourlyReminder, 60000);

/* ---- INIT ---- */
renderDashboard();
renderCicilan();
</script>
